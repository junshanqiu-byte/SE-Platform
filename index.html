<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>山秋枫树园 · 庭院美学顾问赋能平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100%; height: -webkit-fill-available;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            transition: background 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .theme-mint .bg-layer { background: linear-gradient(145deg, #dcece8 0%, #eaf5f2 100%); }
        .theme-spring .bg-layer { background: linear-gradient(145deg, #d8e8e0 0%, #e8f2ec 100%); }
        .theme-misty .bg-layer { background: linear-gradient(145deg, #d5e2e8 0%, #e6eef2 100%); }
        .bg-blur-circles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .bg-blur-circles .circle {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
            transition: background 0.8s ease, transform 0.8s ease;
        }
        .bg-blur-circles .c1 { width: 400px; height: 400px; top: -120px; right: -100px; }
        .bg-blur-circles .c2 { width: 350px; height: 350px; bottom: -80px; left: -80px; }
        .bg-blur-circles .c3 { width: 200px; height: 200px; top: 40%; left: 50%; transform: translateX(-50%); }
        .theme-mint .bg-blur-circles .c1 { background: rgba(127,193,197,0.25); }
        .theme-mint .bg-blur-circles .c2 { background: rgba(95,168,166,0.20); }
        .theme-mint .bg-blur-circles .c3 { background: rgba(167,212,210,0.15); }
        .theme-spring .bg-blur-circles .c1 { background: rgba(107,170,158,0.25); }
        .theme-spring .bg-blur-circles .c2 { background: rgba(80,150,138,0.20); }
        .theme-spring .bg-blur-circles .c3 { background: rgba(150,200,188,0.15); }
        .theme-misty .bg-blur-circles .c1 { background: rgba(110,155,181,0.25); }
        .theme-misty .bg-blur-circles .c2 { background: rgba(90,135,161,0.20); }
        .theme-misty .bg-blur-circles .c3 { background: rgba(160,190,210,0.15); }

        #app {
            position: relative; width: 100%; height: 100%; height: -webkit-fill-available;
            z-index: 1; overflow: hidden;
        }

        /* ===== 首页视图 ===== */
        #homeView {
            width: 100%; height: 100%; height: -webkit-fill-available;
            overflow-y: auto;
            padding: 20px 20px 20px;
            padding-top: max(20px, env(safe-area-inset-top, 20px));
            padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
            display: flex; flex-direction: column;
            position: relative; z-index: 2;
            -webkit-overflow-scrolling: touch;
        }
        #homeView::-webkit-scrollbar { width: 0; background: transparent; }

        .top-bar {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 18px; margin-bottom: 16px; padding-top: 4px;
            flex-shrink: 0; position: relative; z-index: 3;
        }
        .brand-avatar {
            position: relative; width: 104px; height: 104px; border-radius: 50%;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.40);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            cursor: pointer; flex-shrink: 0;
            background: rgba(255,255,255,0.20);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .brand-avatar:active { transform: scale(0.94); }
        .brand-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .brand-avatar .placeholder { font-size: 42px; color: rgba(0,0,0,0.08); font-weight: 300; user-select: none; pointer-events: none; }
        .brand-avatar.has-image .placeholder { display: none; }
        .brand-avatar.has-image img { display: block; }
        .brand-avatar input[type="file"] { display: none; }
        .theme-dots {
            display: flex; gap: 10px; flex-shrink: 0;
            padding: 4px 10px;
            background: rgba(255,255,255,0.20);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.15);
        }
        .theme-dots .dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.4);
            cursor: pointer; transition: all 0.3s ease;
            position: relative; -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .theme-dots .dot:active { transform: scale(0.85); }
        .theme-dots .dot.active {
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
            transform: scale(1.12);
        }
        .theme-dots .dot.d1 { background: #7fc1c5; }
        .theme-dots .dot.d2 { background: #6baa9e; }
        .theme-dots .dot.d3 { background: #6e9bb5; }

        .home-header { margin-bottom: 24px; flex-shrink: 0; }
        .home-header .brand {
            font-size: 13px; font-weight: 500; letter-spacing: 2.5px;
            text-transform: uppercase; transition: color 0.6s ease;
            color: rgba(0,0,0,0.20);
        }
        .home-header h1 {
            font-size: 34px; font-weight: 700; letter-spacing: -0.5px;
            line-height: 1.15; margin-top: 4px;
            background: linear-gradient(90deg, #4a8c8a, #7fc1c5, #4a8c8a, #7fc1c5);
            background-size: 300% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerTitle 5s ease-in-out infinite;
        }
        @keyframes shimmerTitle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .theme-mint .home-header h1 {
            background: linear-gradient(90deg, #3a7a78, #7fc1c5, #3a7a78, #7fc1c5);
            background-size: 300% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerTitle 5s ease-in-out infinite;
        }
        .home-header .sub {
            font-size: 15px; color: rgba(0,0,0,0.30);
            margin-top: 6px; letter-spacing: 0.3px;
            transition: color 0.6s ease;
        }
        .home-header .sub strong { color: rgba(0,0,0,0.45); font-weight: 500; }

        /* ===== 卡片网格（无图标） ===== */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
            align-content: start;
            margin-bottom: 12px;
        }
        .card-item {
            padding: 28px 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.40);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
            transition: background 0.4s ease, transform 0.3s ease, border-color 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-item:active { transform: scale(0.96); background: rgba(255,255,255,0.55); }
        .card-item .glow {
            position: absolute; top: -1px; left: 10%; right: 10%;
            height: 1px; opacity: 0; transition: opacity 0.4s;
        }
        .card-item:hover .glow { opacity: 1; }
        .theme-mint .card-item .glow { background: linear-gradient(90deg, transparent, rgba(127,193,197,0.30), transparent); }
        .card-item .title {
            font-size: 18px;
            font-weight: 600;
            color: #1c2e2a;
            letter-spacing: 0.2px;
            margin-bottom: 2px;
        }
        .card-item .desc {
            font-size: 13px;
            color: rgba(0,0,0,0.35);
            line-height: 1.4;
            margin-top: 2px;
        }
        .card-item .meta {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 14px;
            border-radius: 30px;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: background 0.4s ease, color 0.4s ease;
            align-self: flex-start;
        }
        .theme-mint .card-item .meta { color: #5fa8a6; background: rgba(95,168,166,0.06); }
        .card-item .card-number {
            font-size: 11px;
            font-weight: 500;
            color: rgba(0,0,0,0.10);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .home-footer {
            margin-top: 16px; padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.03);
            text-align: center; flex-shrink: 0;
        }
        .home-footer .copyright {
            font-size: 11px; color: rgba(0,0,0,0.12);
            letter-spacing: 0.8px; line-height: 1.6;
        }
        .home-footer .copyright strong { color: rgba(0,0,0,0.22); font-weight: 500; }

        /* ===== 模块视图 ===== */
        .module-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; height: -webkit-fill-available;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateX(20px);
            will-change: transform, opacity;
            z-index: 20;
            background: rgba(255,255,255,0.50);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .module-view.active {
            opacity: 1; pointer-events: auto; transform: translateX(0);
        }

        .module-header {
            flex-shrink: 0;
            padding: 14px 16px 12px;
            background: rgba(255,255,255,0.30);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.20);
            display: flex; align-items: center; gap: 12px;
            position: sticky; top: 0; z-index: 10;
            min-height: 60px;
            flex-wrap: wrap;
        }
        .module-header .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.04);
            background: rgba(255,255,255,0.30);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            font-size: 20px; color: #555;
            cursor: pointer; transition: all 0.2s;
            flex-shrink: 0; font-weight: 300; line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .module-header .back-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.50); }
        .module-header .title {
            font-size: 18px; font-weight: 600; color: #1c2e2a;
            flex: 0 1 auto; letter-spacing: -0.2px;
        }
        .module-header .sub {
            font-size: 12px; color: rgba(0,0,0,0.25);
            letter-spacing: 0.5px; flex-shrink: 0;
        }
        .module-header .breadcrumb {
            font-size: 12px; color: rgba(0,0,0,0.25);
            flex: 1; min-width: 60px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .module-header .breadcrumb span { cursor: pointer; transition: color 0.2s; }
        .module-header .breadcrumb span:hover { color: #3a7a78; }
        .module-header .breadcrumb .sep { color: rgba(0,0,0,0.08); cursor: default; }
        .module-header .breadcrumb .current { color: #3a7a78; font-weight: 500; cursor: default; }

        .module-scroll {
            flex: 1; overflow-y: auto;
            padding: 16px 20px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .module-scroll::-webkit-scrollbar { width: 3px; }
        .module-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 10px; }

        /* ===== 列表项 ===== */
        .list-item {
            background: rgba(255,255,255,0.30);
            border-radius: 16px; padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; transition: all 0.2s;
            margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(4px);
        }
        .list-item:active { transform: scale(0.97); background: rgba(255,255,255,0.50); }
        .list-item .left .title { font-weight: 500; color: #1c2e2a; font-size: 15px; }
        .list-item .left .sub { font-size: 12px; color: rgba(0,0,0,0.30); }
        .list-item .arrow { color: rgba(0,0,0,0.12); font-size: 18px; }
        .list-item .tag {
            font-size: 11px; color: #3a7a78;
            background: rgba(127,193,197,0.06);
            padding: 2px 10px; border-radius: 20px;
        }

        /* ===== 网格卡片 ===== */
        .grid-cards {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
            margin-top: 8px;
        }
        .grid-card {
            background: rgba(255,255,255,0.30);
            border-radius: 16px; padding: 18px 14px;
            border: 1px solid rgba(255,255,255,0.10);
            cursor: pointer; transition: all 0.2s;
            text-align: center; backdrop-filter: blur(4px);
        }
        .grid-card:active { transform: scale(0.95); background: rgba(255,255,255,0.50); }
        .grid-card .num { font-size: 22px; font-weight: 700; color: #3a7a78; display: block; line-height: 1.2; }
        .grid-card .name { font-size: 14px; font-weight: 500; color: #1c2e2a; margin-top: 4px; }
        .grid-card .sub { font-size: 11px; color: rgba(0,0,0,0.25); margin-top: 2px; }

        /* ===== 节点列表 ===== */
        .node-item {
            background: rgba(255,255,255,0.25);
            border-radius: 12px; padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .node-item:active { transform: scale(0.97); background: rgba(255,255,255,0.45); }
        .node-item .id { font-weight: 700; color: #3a7a78; font-size: 13px; }
        .node-item .name { font-weight: 500; color: #1c2e2a; font-size: 15px; }
        .node-item .desc { font-size: 13px; color: rgba(0,0,0,0.40); margin-top: 2px; }

        /* ===== 品种列表 ===== */
        .variety-item {
            background: rgba(255,255,255,0.25);
            border-radius: 12px; padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .variety-item:active { transform: scale(0.97); background: rgba(255,255,255,0.45); }
        .variety-item .name { font-weight: 500; color: #1c2e2a; font-size: 15px; }
        .variety-item .latin { font-size: 12px; color: rgba(0,0,0,0.25); font-style: italic; }

        /* ===== 话术列表 ===== */
        .script-item {
            background: rgba(255,255,255,0.25);
            border-radius: 12px; padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .script-item:active { transform: scale(0.97); background: rgba(255,255,255,0.45); }
        .script-item .name { font-weight: 500; color: #1c2e2a; font-size: 15px; }
        .script-item .desc { font-size: 13px; color: rgba(0,0,0,0.35); margin-top: 2px; }

        /* ===== iframe 文件视图 ===== */
        .file-view {
            flex: 1; position: relative;
            background: rgba(255,255,255,0.10);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 4px;
            min-height: 400px;
        }
        .file-view iframe {
            width: 100%; height: 100%;
            border: none; display: block;
            background: transparent;
            min-height: 400px;
        }
        .file-view .file-placeholder {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; min-height: 300px;
            color: rgba(0,0,0,0.20);
            font-size: 14px; text-align: center;
            padding: 40px 20px;
        }
        .file-view .file-placeholder .big { font-size: 40px; margin-bottom: 12px; opacity: 0.2; }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .grid-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
        @media (max-width: 480px) {
            #homeView { padding: 16px 16px 16px; padding-top: max(16px, env(safe-area-inset-top,16px)); padding-bottom: max(16px, env(safe-area-inset-bottom,16px)); }
            .top-bar { gap: 14px; margin-bottom: 12px; }
            .brand-avatar { width: 88px; height: 88px; }
            .brand-avatar .placeholder { font-size: 34px; }
            .theme-dots { gap: 8px; padding: 3px 8px; }
            .theme-dots .dot { width: 14px; height: 14px; }
            .home-header h1 { font-size: 26px; }
            .card-grid { gap: 12px; }
            .card-item { padding: 20px 16px; border-radius: 20px; }
            .card-item .title { font-size: 16px; }
            .module-header .title { font-size: 16px; }
            .module-header .back-btn { width: 36px; height: 36px; font-size: 18px; }
            .module-header { padding: 10px 12px 10px; min-height: 52px; }
            .grid-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
            .module-scroll { padding: 12px 14px 16px; }
            .grid-card { padding: 14px 10px; }
            .grid-card .num { font-size: 18px; }
        }
        @media (max-width: 380px) {
            .home-header h1 { font-size: 22px; }
            .card-grid { gap: 8px; }
            .card-item { padding: 16px 12px; border-radius: 16px; }
            .card-item .title { font-size: 14px; }
            .card-item .desc { font-size: 12px; }
            .brand-avatar { width: 72px; height: 72px; }
            .brand-avatar .placeholder { font-size: 28px; }
            .theme-dots .dot { width: 12px; height: 12px; }
            .grid-cards { grid-template-columns: 1fr; }
        }
        @media (min-width: 800px) {
            #homeView { padding: 40px 80px 40px; max-width: 900px; margin: 0 auto; }
            .top-bar { margin-bottom: 24px; }
            .brand-avatar { width: 120px; height: 120px; }
            .brand-avatar .placeholder { font-size: 48px; }
            .card-grid { gap: 24px; }
            .card-item { padding: 36px 32px; border-radius: 28px; }
            .card-item .title { font-size: 20px; }
            .home-header h1 { font-size: 42px; }
            .theme-dots .dot { width: 18px; height: 18px; }
            .grid-cards { grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
            .module-scroll { padding: 20px 32px 28px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-blur-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div id="app" class="theme-mint">

        <!-- ===== 首页 ===== -->
        <div id="homeView">
            <div class="top-bar">
                <div class="brand-avatar" id="brandAvatar" title="点击上传品牌图片">
                    <span class="placeholder">📷</span>
                    <img id="brandImage" src="" alt="品牌图标" />
                    <input type="file" id="imageUpload" accept="image/*" />
                </div>
                <div class="theme-dots">
                    <div class="dot d1 active" data-theme="mint"></div>
                    <div class="dot d2" data-theme="spring"></div>
                    <div class="dot d3" data-theme="misty"></div>
                </div>
            </div>

            <div class="home-header">
                <div class="brand">山秋枫树园</div>
                <h1>庭院美学顾问<br />赋能平台</h1>
                <div class="sub">大规格品种枫树 · <strong>专业话术体系</strong></div>
            </div>

            <div class="card-grid">
                <div class="card-item" data-module="part1">
                    <div class="glow"></div>
                    <div class="card-number">01</div>
                    <div class="title">日本枫树入门课程</div>
                    <div class="desc">系统化主播成长体系</div>
                    <span class="meta">7 门课程</span>
                </div>
                <div class="card-item" data-module="part2">
                    <div class="glow"></div>
                    <div class="card-number">02</div>
                    <div class="title">形态分类话术手册</div>
                    <div class="desc">树形 · 叶色 · 叶形</div>
                    <span class="meta">3 大分类</span>
                </div>
                <div class="card-item" data-module="part3">
                    <div class="glow"></div>
                    <div class="card-number">03</div>
                    <div class="title">场景节点速查手册</div>
                    <div class="desc">八大场景 · 79个节点</div>
                    <span class="meta">8 大场景</span>
                </div>
                <div class="card-item" data-module="part4">
                    <div class="glow"></div>
                    <div class="card-number">04</div>
                    <div class="title">全体系话术手册</div>
                    <div class="desc">六大话术体系 · 顾问式沟通</div>

                } else {
                    html += `<span onclick="goBackTo(${i+1})">${p}</span>`;
                }
            });
            return html;

            if (level < 1) { hideModule(); return; }
            path = path.slice(0, level);
            renderCurrentModule();

                            <span class="num" style="font-size:16px;font-weight:500;color:#3a7a78;">${s.nodes}</span>
                            <div class="name">${s.name}</div>
                            <div class="sub">${s.desc}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
            }
        }

        function openScene(sid) {
            const scene = SCENES.find(s => s.id === sid);
            if (!scene || !scene.file) { alert('文件不存在'); return; }
            openFileView(scene.name, scene.file, `${scene.nodes} · ${scene.desc}`);
        }

        // -------- Part4: 话术 --------
        function renderPart4() {
            if (path.length === 0) {
                path = ['全体系话术手册'];
                moduleTitle.textContent = '全体系话术手册';
                moduleSub.textContent = '六大话术体系';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                let html = `<div style="margin-bottom:12px;font-size:13px;color:rgba(0,0,0,0.25);">顾问式沟通</div>`;
                html += `<div class="script-list">`;
                SCRIPT_TYPES.forEach(s => {
                    html += `
                        <div class="script-item" onclick="openScript('${s.id}')">
                            <div class="name">${s.name}</div>
                            <div class="desc">${s.desc}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
            }
        }

        function openScript(sid) {
            const script = SCRIPT_TYPES.find(s => s.id === sid);
            if (!script || !script.file) { alert('文件不存在'); return; }
            openFileView(script.name, script.file, script.desc);
        }

        // -------- Part5: 品种 --------
        function renderPart5() {
            if (path.length === 0) {
                path = ['主播品种速查手册'];
                moduleTitle.textContent = '主播品种速查手册';
                moduleSub.textContent = '29个品种';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                let html = `<div style="margin-bottom:12px;font-size:13px;color:rgba(0,0,0,0.25);">完整档案</div>`;
                html += `<div class="variety-list">`;
                VARIETIES.forEach(v => {
                    html += `
                        <div class="variety-item" onclick="openVariety('${v.id}')">
                            <span class="name">${v.name}</span>
                            <span class="latin">${v.latin}</span>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
            }
        }

        function openVariety(vid) {
            openFileView('品种速查手册', VARIETIES_FILE, '29个品种 · 完整档案');
        }

        // ================================================================
        //  事件绑定
        // ================================================================
        document.querySelectorAll('.card-item').forEach(card => {
            card.addEventListener('click', () => {
                const module = card.dataset.module;
                if (!module) return;
                currentModule = module;
                path = [];
                showModule();
                renderCurrentModule();
            });
        });

        moduleBack.addEventListener('click', navigateBack);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && moduleView.classList.contains('active')) {
                navigateBack();
            }
        });

        // 暴露函数到全局
        window.openCourse = openCourse;
        window.openTreeDetail = openTreeDetail;
        window.openColorDetail = openColorDetail;
        window.openLeafDetail = openLeafDetail;
        window.openScene = openScene;
        window.openScript = openScript;
        window.openVariety = openVariety;
        window.openPart2A = openPart2A;
        window.openPart2B = openPart2B;
        window.openPart2C = openPart2C;
        window.goBackTo = goBackTo;
        window.navigateBack = navigateBack;

        console.log('🌳 山秋枫树园 · 庭院美学顾问赋能平台');
        console.log('📚 模块: 课程(7) · 形态(树形12/色系7/叶形6) · 场景(8) · 话术(6) · 品种(1)');
        console.log('📁 请确保所有 part*.html 文件与 index.html 在同一目录下');
    </script>

</body>
</html>
