<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>山秋枫树园 · 庭院美学顾问赋能平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: background 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .theme-mint .bg-layer { background: linear-gradient(145deg, #c2d6d1 0%, #d6e8e2 100%); }
        .theme-neon .bg-layer { background: linear-gradient(145deg, #0b111f 0%, #141b2d 50%, #0f1628 100%); }

        .bg-blur-circles {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            z-index:0;
            pointer-events:none;
            overflow:hidden;
        }
        .bg-blur-circles .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            transition: background 0.8s ease, transform 0.8s ease;
        }
        .bg-blur-circles .c1 { width:400px; height:400px; top:-120px; right:-100px; }
        .bg-blur-circles .c2 { width:350px; height:350px; bottom:-80px; left:-80px; }
        .bg-blur-circles .c3 { width:200px; height:200px; top:40%; left:50%; transform:translateX(-50%); }
        .theme-mint .bg-blur-circles .c1 { background:rgba(127,193,197,0.30); }
        .theme-mint .bg-blur-circles .c2 { background:rgba(95,168,166,0.25); }
        .theme-mint .bg-blur-circles .c3 { background:rgba(167,212,210,0.20); }
        .theme-neon .bg-blur-circles .c1 { background:rgba(0,180,255,0.10); }
        .theme-neon .bg-blur-circles .c2 { background:rgba(120,50,255,0.08); }
        .theme-neon .bg-blur-circles .c3 { background:rgba(0,200,255,0.05); }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            z-index: 1;
            overflow: hidden;
        }

        #homeView {
            width:100%; height:100%; height:-webkit-fill-available;
            overflow-y:auto;
            padding:20px 24px 20px;
            padding-top:max(20px, env(safe-area-inset-top,20px));
            padding-bottom:max(20px, env(safe-area-inset-bottom,20px));
            display:flex;
            flex-direction:column;
            position:relative;
            z-index:2;
            -webkit-overflow-scrolling:touch;
            background: rgba(210, 226, 220, 0.70);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: background 0.6s ease, backdrop-filter 0.6s ease;
        }
        #homeView::-webkit-scrollbar { width:0; background:transparent; }
        .theme-neon #homeView {
            background: rgba(0, 0, 0, 0.60) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .top-bar {
            display:flex;
            align-items:center;
            justify-content:flex-end;
            gap:16px;
            margin-bottom:20px;
            padding-top:4px;
            flex-shrink:0;
            position:relative;
            z-index:3;
        }
        .brand-logo {
            width:130px; height:130px;
            border-radius:50%;
            flex-shrink:0;
            background:rgba(255,255,255,0.15);
            border:2px solid rgba(255,255,255,0.25);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            user-select:none;
            transition:background 0.3s ease, border-color 0.3s ease;
            position:relative;
        }
        .brand-logo img { width:100%; height:100%; object-fit:cover; display:block; }
        .brand-logo .logo-text {
            font-size:30px; font-weight:600;
            color:rgba(0,0,0,0.15);
            letter-spacing:1px;
            display:none;
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
        }
        .brand-logo.fallback .logo-text { display:block; }
        .brand-logo.fallback img { display:none; }
        .theme-neon .brand-logo { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
        .theme-neon .brand-logo .logo-text { color:rgba(255,255,255,0.30); }

        .theme-dots {
            display:flex;
            gap:12px;
            flex-shrink:0;
            padding:6px 14px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border-radius:40px;
            border:1px solid rgba(255,255,255,0.20);
            transition:background 0.4s ease, border-color 0.4s ease;
        }
        .theme-neon .theme-dots { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.10); }
        .theme-dots .dot {
            width:20px !important;
            height:20px !important;
            border-radius:50%;
            border:2px solid rgba(255,255,255,0.5);
            cursor:pointer;
            transition:all 0.3s ease;
            flex-shrink:0;
            padding:0;
            margin:0;
            background-clip: content-box;
            box-sizing: border-box;
        }
        .theme-dots .dot:active { transform:scale(0.85); }
        .theme-dots .dot.active {
            border-color:#ffffff;
            box-shadow:0 0 0 4px rgba(255,255,255,0.2);
            transform:scale(1.12);
        }
        .theme-neon .theme-dots .dot.active { box-shadow:0 0 0 4px rgba(0,180,255,0.25); border-color:#00ccff; }
        .theme-dots .dot.d1 { background:#7fc1c5; }
        .theme-dots .dot.d4 { background:linear-gradient(135deg,#1a1a3e,#2d1b69); border-color:rgba(167,139,250,0.4); }
        .theme-dots .dot.d4.active { border-color:#a78bfa; box-shadow:0 0 0 4px rgba(167,139,250,0.25); }
        .theme-neon .theme-dots .dot.d4.active { border-color:#a78bfa; box-shadow:0 0 0 4px rgba(167,139,250,0.30); }

        .home-header {
            margin-bottom:20px;
            flex-shrink:0;
        }
        .home-header .brand {
            font-size:16px; font-weight:500;
            letter-spacing:4px;
            text-transform:uppercase;
            color:rgba(0,0,0,0.15);
        }
        .theme-neon .home-header .brand { color: rgba(255, 255, 255, 0.70) !important; }
        .home-header h1 {
            font-size:38px; font-weight:700;
            letter-spacing:-0.5px;
            line-height:1.1;
            margin-top:4px;
            background:linear-gradient(90deg,#4a8c8a,#7fc1c5,#4a8c8a,#7fc1c5);
            background-size:300% 100%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:shimmerTitle 5s ease-in-out infinite;
        }
        @keyframes shimmerTitle {
            0% { background-position:0% 50%; }
            50% { background-position:100% 50%; }
            100% { background-position:0% 50%; }
        }
        .theme-mint .home-header h1 {
            background:linear-gradient(90deg,#3a7a78,#7fc1c5,#3a7a78,#7fc1c5);
            background-size:300% 100%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:shimmerTitle 5s ease-in-out infinite;
        }
        .theme-neon .home-header h1 {
            background:linear-gradient(90deg,#7ec8f0,#00ccff,#a78bfa,#7ec8f0);
            background-size:300% 100%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:shimmerTitle 5s ease-in-out infinite;
        }
        .home-header .sub {
            font-size:18px;
            color:rgba(0,0,0,0.20);
            margin-top:4px;
            letter-spacing:0.3px;
        }
        .home-header .sub strong { color:rgba(0,0,0,0.35); font-weight:500; }
        .theme-neon .home-header .sub {
            color: rgba(255, 255, 255, 0.75) !important;
        }
        .theme-neon .home-header .sub strong {
            color: rgba(255, 255, 255, 0.90) !important;
        }

        .card-grid {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:20px;
            flex:1;
            align-content:start;
            margin-bottom:16px;
        }
        .card-item {
            position:relative;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.2,0,0,1);
            -webkit-tap-highlight-color:transparent;
            background:rgba(255,255,255,0.50);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.40);
            border-radius:24px;
            padding:24px 20px 20px;
            box-shadow:0 8px 32px rgba(0,0,0,0.04);
            display:flex;
            flex-direction:column;
            justify-content:center;
            min-height:130px;
            transition:all 0.35s ease;
            overflow:hidden;
        }
        .card-item:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,0.06); }
        .card-item:active { transform:scale(0.97); background:rgba(255,255,255,0.65); }
        .theme-neon .card-item {
            background:rgba(14,22,44,0.55) !important;
            border:1px solid rgba(255,255,255,0.06) !important;
            box-shadow:0 8px 32px rgba(0,0,0,0.30) !important;
        }
        .theme-neon .card-item:hover { box-shadow:0 12px 40px rgba(0,0,0,0.40) !important; }
        .theme-neon .card-item:active { background:rgba(14,22,44,0.75) !important; }
        .card-item .glow {
            position:absolute;
            top:-1px; left:15%; right:15%;
            height:2px;
            opacity:0;
            transition:opacity 0.4s;
            border-radius:0 0 50% 50%;
        }
        .card-item:hover .glow { opacity:1; }
        .theme-mint .card-item .glow { background:linear-gradient(90deg, transparent, rgba(127,193,197,0.40), transparent); }
        .theme-neon .card-item .glow { background:linear-gradient(90deg, transparent, rgba(0,204,255,0.40), transparent); }
        .card-item .number-tag {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:32px; height:32px;
            border-radius:50%;
            background:rgba(127,193,197,0.10);
            color:rgba(127,193,197,0.7);
            font-size:13px;
            font-weight:600;
            margin-bottom:10px;
            border:1px solid rgba(127,193,197,0.15);
            transition:background 0.3s, color 0.3s;
        }
        .theme-neon .card-item .number-tag {
            background:rgba(0,204,255,0.08);
            color:rgba(0,204,255,0.5);
            border-color:rgba(0,204,255,0.10);
        }
        .card-item .title {
            font-size:20px; font-weight:600;
            color:#1c2e2a;
            letter-spacing:-0.2px;
            line-height:1.2;
            margin-bottom:2px;
        }
        .theme-neon .card-item .title { color:rgba(255,255,255,0.90) !important; }
        .card-item .desc {
            font-size:14px;
            color:rgba(0,0,0,0.35);
            line-height:1.4;
        }
        .theme-neon .card-item .desc { color:rgba(255,255,255,0.45) !important; }
        .card-item .meta {
            display:inline-block;
            font-size:11px; font-weight:500;
            padding:2px 12px;
            border-radius:30px;
            margin-top:10px;
            letter-spacing:0.4px;
            align-self:flex-start;
            background:rgba(95,168,166,0.08);
            color:#5fa8a6;
        }
        .theme-neon .card-item .meta {
            background:rgba(0,204,255,0.06);
            color:#00ccff;
        }

        .home-footer {
            margin-top:10px;
            padding-top:12px;
            border-top:1px solid rgba(0,0,0,0.04);
            text-align:center;
            flex-shrink:0;
        }
        .theme-neon .home-footer { border-top-color:rgba(255,255,255,0.04); }
        .home-footer .copyright {
            font-size:15px;
            color:rgba(0,0,0,0.15);
            letter-spacing:0.6px;
            line-height:1.6;
        }
        .home-footer .copyright strong { color:rgba(0,0,0,0.25); font-weight:500; }
        .theme-neon .home-footer .copyright {
            color: rgba(255, 255, 255, 0.35) !important;
        }
        .theme-neon .home-footer .copyright strong {
            color: rgba(255, 255, 255, 0.50) !important;
        }

        .module-view {
            position:absolute; top:0; left:0;
            width:100%; height:100%; height:-webkit-fill-available;
            display:flex;
            flex-direction:column;
            opacity:0;
            pointer-events:none;
            transition:opacity 0.4s ease, transform 0.4s ease;
            transform:translateX(20px);
            will-change:transform, opacity;
            z-index:20;
            background:rgba(255,255,255,0.50);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            padding-top:env(safe-area-inset-top,0);
            padding-bottom:env(safe-area-inset-bottom,0);
        }
        .module-view.active {
            opacity:1;
            pointer-events:auto;
            transform:translateX(0);
        }
        .theme-neon .module-view { background:rgba(0,0,0,0.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }

        .module-header {
            flex-shrink:0;
            padding:14px 18px 14px;
            background:rgba(255,255,255,0.20);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.15);
            display:flex;
            align-items:center;
            gap:14px;
            position:sticky; top:0;
            z-index:10;
            min-height:64px;
            flex-wrap:wrap;
        }
        .theme-neon .module-header { background:rgba(0,0,0,0.45); border-bottom:1px solid rgba(255,255,255,0.06); }
        .module-header.hide { display:none !important; }
        .module-header .back-btn {
            display:flex; align-items:center; justify-content:center;
            width:44px; height:44px;
            border-radius:50%;
            border:1px solid rgba(0,0,0,0.04);
            background:rgba(255,255,255,0.20);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            font-size:24px;
            color:#555;
            cursor:pointer;
            transition:all 0.2s;
            flex-shrink:0;
            font-weight:300;
            line-height:1;
            -webkit-tap-highlight-color:transparent;
        }
        .module-header .back-btn:active { transform:scale(0.92); background:rgba(255,255,255,0.40); }
        .theme-neon .module-header .back-btn { border-color:rgba(255,255,255,0.08); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.50); }
        .theme-neon .module-header .back-btn:active { background:rgba(255,255,255,0.12); }
        .module-header .title {
            font-size:20px; font-weight:600;
            color:#1c2e2a;
            flex:0 1 auto;
            letter-spacing:-0.2px;
        }
        .theme-neon .module-header .title { color:rgba(255,255,255,0.90); }
        .module-header .sub {
            font-size:14px;
            color:rgba(0,0,0,0.25);
            letter-spacing:0.4px;
            flex-shrink:0;
        }
        .theme-neon .module-header .sub { color:rgba(255,255,255,0.50); }
        .module-header .breadcrumb {
            font-size:15px;
            color:rgba(0,0,0,0.25);
            flex:1;
            min-width:60px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .theme-neon .module-header .breadcrumb { color:rgba(255,255,255,0.45); }
        .module-header .breadcrumb span { cursor:pointer; }
        .module-header .breadcrumb span:hover { color:#3a7a78; }
        .theme-neon .module-header .breadcrumb span:hover { color:#00ccff; }
        .module-header .breadcrumb .sep { color:rgba(0,0,0,0.08); cursor:default; }
        .theme-neon .module-header .breadcrumb .sep { color:rgba(255,255,255,0.08); }
        .module-header .breadcrumb .current { color:#3a7a78; font-weight:500; cursor:default; }
        .theme-neon .module-header .breadcrumb .current { color:#00ccff; }

        .module-scroll {
            flex:1;
            overflow-y:auto;
            padding:16px 20px 20px;
            -webkit-overflow-scrolling:touch;
            display:block;
        }
        .module-scroll::-webkit-scrollbar { width:3px; }
        .module-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.06); border-radius:10px; }
        .theme-neon .module-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); }

        .module-scroll.file-mode {
            display:flex !important;
            flex-direction:column !important;
            padding:0 !important;
            overflow:hidden !important;
            height:100% !important;
        }
        .module-scroll.file-mode .file-view {
            flex:1 1 auto !important;
            min-height:0 !important;
            margin-top:0 !important;
            border-radius:0 !important;
            height:100% !important;
        }
        .module-scroll.file-mode .file-view iframe {
            height:100% !important;
            min-height:0 !important;
            display:block;
        }
        .module-scroll.file-mode .file-view .file-placeholder {
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            min-height:200px;
        }

        .list-item {
            background:rgba(255,255,255,0.30);
            border-radius:16px;
            padding:16px 20px;
            border:1px solid rgba(255,255,255,0.15);
            cursor:pointer;
            transition:all 0.2s;
            margin-bottom:12px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            backdrop-filter:blur(4px);
        }
        .list-item:active { transform:scale(0.97); background:rgba(255,255,255,0.50); }
        .theme-neon .list-item { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.06); }
        .theme-neon .list-item:active { background:rgba(255,255,255,0.08); }
        .list-item .left .title {
            font-weight:500;
            color:#1c2e2a;
            font-size:18px;
        }
        .theme-neon .list-item .left .title { color:rgba(255,255,255,0.90); }
        .list-item .left .sub {
            font-size:14px;
            color:rgba(0,0,0,0.30);
        }
        .theme-neon .list-item .left .sub { color:rgba(255,255,255,0.50); }
        .list-item .arrow {
            color:rgba(0,0,0,0.12);
            font-size:20px;
        }
        .theme-neon .list-item .arrow { color:rgba(255,255,255,0.20); }

        .grid-cards {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));
            gap:12px;
            margin-top:10px;
        }
        .scene-grid {
            display:grid;
            grid-template-columns:repeat(4, 1fr) !important;
            gap:14px;
            justify-items:center;
            margin-top:10px;
        }
        .scene-grid .grid-card {
            width:100%;
            max-width:200px;
            text-align:center;
        }
        @media (max-width: 640px) {
            .scene-grid { grid-template-columns:repeat(2, 1fr) !important; gap:10px; }
        }
        .color-grid, .leaf-grid {
            display:grid;
            grid-template-columns:repeat(4, 1fr) !important;
            gap:14px;
            justify-items:center;
            margin-top:10px;
        }
        .color-grid .grid-card, .leaf-grid .grid-card {
            width:100%;
            max-width:200px;
            text-align:center;
        }
        @media (max-width: 640px) {
            .color-grid, .leaf-grid { grid-template-columns:repeat(2, 1fr) !important; gap:10px; }
        }
        @media (max-width: 480px) {
            .scene-grid, .color-grid, .leaf-grid { grid-template-columns:repeat(2, 1fr) !important; }
        }

        .grid-card {
            background:rgba(255,255,255,0.30);
            border-radius:16px;
            padding:16px 12px;
            border:1px solid rgba(255,255,255,0.10);
            cursor:pointer;
            transition:all 0.2s;
            text-align:center;
            backdrop-filter:blur(4px);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:80px;
        }
        .grid-card:active { transform:scale(0.95); background:rgba(255,255,255,0.50); }
        .theme-neon .grid-card { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.06); }
        .theme-neon .grid-card:active { background:rgba(255,255,255,0.08); }
        .grid-card .num {
            font-size:22px; font-weight:600;
            color:#3a7a78;
            display:block;
            line-height:1.2;
        }
        .theme-neon .grid-card .num { color:#00ccff; }
        .grid-card .name {
            font-size:16px; font-weight:500;
            color:#1c2e2a;
            margin-top:4px;
        }
        .theme-neon .grid-card .name { color:rgba(255,255,255,0.90); }
        .grid-card .sub {
            font-size:12px;
            color:rgba(0,0,0,0.25);
            margin-top:2px;
        }

            homeView.style.display = 'flex';

        function renderBreadcrumb() {
            let html = '';
            path.forEach((p, i) => {
                if (i > 0) html += `<span class="sep"> › </span>`;
                if (i === path.length - 1) {
                    html += `<span class="current">${p}</span>`;
                } else {
                    html += `<span onclick="goBackTo(${i+1})">${p}</span>`;
                }
            });
            return html;
        }

        function pushHistoryState(title) {
            const state = { module: currentModule, path: [...path], title: title };
            historyStack.push(state);
            const url = window.location.pathname + '?state=' + encodeURIComponent(JSON.stringify(state));
            history.pushState(state, title, url);
        }

        function goBackTo(level) {
            if (level < 1) { hideModule(); return; }
            const steps = path.length - level;
            if (steps <= 0) return;
            history.go(-steps);
        }

        // ================================================================
        //  专用修复：枫树专用肥 - 图片同行等高完整显示
        // ================================================================
        function fixFertilizerLayout(doc) {
            const allImgs = doc.querySelectorAll('img');
            if (allImgs.length < 2) return;

            const groups = new Map();
            allImgs.forEach(img => {
                let parent = img.parentNode;
                while (parent && parent !== doc.body && parent.nodeType === 1) {
                    const style = window.getComputedStyle(parent);
                    if (style.display === 'block' || style.display === 'flex' || style.display === 'grid' || style.display === 'inline-block') {
                        if (!groups.has(parent)) groups.set(parent, []);
                        groups.get(parent).push(img);
                        break;
                    }
                    parent = parent.parentNode;
                }
            });

            groups.forEach((imgs, container) => {
                if (imgs.length >= 2) {
                    container.style.setProperty('display', 'flex', 'important');
                    container.style.setProperty('flex-wrap', 'nowrap', 'important');
                    container.style.setProperty('justify-content', 'center', 'important');
                    container.style.setProperty('align-items', 'stretch', 'important');
                    container.style.setProperty('gap', '4px', 'important');
                    container.style.setProperty('width', '100%', 'important');
                    imgs.forEach(img => {
                        img.style.setProperty('flex', '1 1 0', 'important');
                        img.style.setProperty('max-height', '50vh', 'important');
                        img.style.setProperty('object-fit', 'contain', 'important');
                        img.style.setProperty('width', 'auto', 'important');
                        img.style.setProperty('height', 'auto', 'important');
                        img.style.setProperty('min-height', '0', 'important');
                        img.style.setProperty('display', 'block', 'important');
                    });
                    container.querySelectorAll('br, .break, .clearfix').forEach(el => el.style.display = 'none');
                }
            });
        }

        // ================================================================
        //  ★★★ 全屏图片查看器（品种详情页专用，带重试机制）★★★
        // ================================================================
        function injectImageViewer(doc) {
            if (!doc || !doc.body) return;
            // 避免重复注入
            if (doc.getElementById('custom-image-viewer')) return;

            // 查找所有图片
            let images = doc.querySelectorAll('img');
            if (images.length === 0) {
                // 如果还没图片，用 MutationObserver 监听
                const observer = new MutationObserver(() => {
                    const newImgs = doc.querySelectorAll('img');
                    if (newImgs.length > 0) {
                        observer.disconnect();
                        initViewer(doc, newImgs);
                    }
                });
                observer.observe(doc.body, { childList: true, subtree: true });
                return;
            }
            initViewer(doc, images);
        }

        function initViewer(doc, images) {
            if (!images || images.length === 0) return;
            // 创建遮罩
            const overlay = doc.createElement('div');
            overlay.id = 'custom-image-viewer';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0,0,0,0.92);
                z-index: 99999;
                display: none;
                align-items: center;
                justify-content: center;
                touch-action: none;
                cursor: zoom-out;
                user-select: none;
                -webkit-user-select: none;
            `;

            const imgContainer = doc.createElement('div');
            imgContainer.style.cssText = `
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                touch-action: none;
            `;
            const imgEl = doc.createElement('img');
            imgEl.style.cssText = `
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                touch-action: none;
                transition: transform 0.1s linear;
                will-change: transform;
            `;
            imgContainer.appendChild(imgEl);
            overlay.appendChild(imgContainer);

            const closeBtn = doc.createElement('button');
            closeBtn.textContent = '✕';
            closeBtn.style.cssText = `
                position: absolute;
                top: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
                border: none;
                border-radius: 50%;
                background: rgba(255,255,255,0.15);
                color: #fff;
                font-size: 24px;
                cursor: pointer;
                z-index: 10;
                touch-action: manipulation;
                display: flex;
                align-items: center;
                justify-content: center;
            `;
            overlay.appendChild(closeBtn);

            doc.body.appendChild(overlay);

            let scale = 1;
            let translateX = 0, translateY = 0;
            let startX = 0, startY = 0;
            let isDragging = false;
            let pinchStartDist = 0;
            let pinchStartScale = 1;
            let isPinching = false;

            function openViewer(src) {
                imgEl.src = src;
                scale = 1;
                translateX = 0;
                translateY = 0;
                updateTransform();
                overlay.style.display = 'flex';
            }

            function closeViewer() {
                overlay.style.display = 'none';
            }

            function updateTransform() {
                imgEl.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
            }

            // 为每个图片绑定点击事件
            images.forEach(img => {
                img.style.cursor = 'pointer';
                img.addEventListener('click', function(e) {
                    e.stopPropagation();
                    openViewer(this.src);
                });
            });

            // 关闭事件
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target === imgContainer) {
                    closeViewer();
                }
            });
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeViewer();
            });
            doc.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeViewer();
            });

            // 触摸事件
            let lastTouchX = 0, lastTouchY = 0;
            imgContainer.addEventListener('touchstart', function(e) {
                const touches = e.touches;
                if (touches.length === 2) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    pinchStartDist = Math.sqrt(dx*dx + dy*dy);
                    pinchStartScale = scale;
                    isPinching = true;
                } else if (touches.length === 1 && scale > 1) {
                    isDragging = true;
                    startX = touches[0].clientX;
                    startY = touches[0].clientY;
                    lastTouchX = translateX;
                    lastTouchY = translateY;
                }
            }, { passive: true });

            imgContainer.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const touches = e.touches;
                if (touches.length === 2 && isPinching) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const delta = dist / pinchStartDist;
                    let newScale = pinchStartScale * delta;
                    newScale = Math.min(Math.max(newScale, 0.5), 5);
                    scale = newScale;
                    if (scale === 1) {
                        translateX = 0;
                        translateY = 0;
                    }
                    updateTransform();
                } else if (touches.length === 1 && isDragging) {
                    const dx = touches[0].clientX - startX;
                    const dy = touches[0].clientY - startY;
                    translateX = lastTouchX + dx;
                    translateY = lastTouchY + dy;
                    updateTransform();
                }
            }, { passive: false });

            imgContainer.addEventListener('touchend', function(e) {
                isDragging = false;
                isPinching = false;
                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                    updateTransform();
                }
            }, { passive: true });

            // 滚轮缩放
            imgContainer.addEventListener('wheel', function(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                let newScale = scale * delta;
                newScale = Math.min(Math.max(newScale, 0.5), 5);
                scale = newScale;
                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                }
                updateTransform();
            }, { passive: false });
        }

            if (path.length === 0) path = ['日本枫树入门课程'];
            if (path.length === 1) path.push(course.title);
            else path[1] = course.title;
            openFileView(course.title, course.file, '课程详情');
        }

        // -------- Part2: 形态分类 --------
        function renderPart2() {
            moduleScroll.classList.remove('file-mode');
            if (path.length === 0) {
                path = ['形态分类话术手册'];
                moduleTitle.textContent = '形态分类话术手册';
                moduleSub.textContent = '树形 · 叶色 · 叶形';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                pushHistoryState('形态分类话术手册');
            }

            const root = path[0];
            if (path.length === 1) {
                moduleTitle.textContent = '形态分类话术手册';
                moduleSub.textContent = '树形 · 叶色 · 叶形';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                moduleScroll.innerHTML = `
                    <div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">选择分类</div>
                    <div class="list-view">
                        <div class="list-item" onclick="openPart2A()">
                            <div class="left"><div class="title">A. 树形分类</div><div class="sub">12种树形 · 骨架价值</div></div>
                            <span class="arrow">›</span>
                        </div>
                        <div class="list-item" onclick="openPart2B()">
                            <div class="left"><div class="title">B. 叶色分类</div><div class="sub">7个色系 · 色彩科学</div></div>
                            <span class="arrow">›</span>
                        </div>
                        <div class="list-item" onclick="openPart2C()">
                            <div class="left"><div class="title">C. 叶形分类</div><div class="sub">6种叶形 · 形态辨识</div></div>
                            <span class="arrow">›</span>
                        </div>
                    </div>
                `;
            } else if (path.length === 2) {
                const sub = path[1];
                if (sub === '树形分类') {
                    moduleTitle.textContent = '树形分类';
                    moduleSub.textContent = '12种树形';
                    moduleBreadcrumb.innerHTML = renderBreadcrumb();
                    let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">骨架价值</div>`;
                    html += `<div class="grid-cards">`;
                    TREE_TYPES.forEach(t => {
                        html += `
                            <div class="grid-card" onclick="openTreeDetail('${t.id}')">
                                <span class="num">${t.num}</span>
                                <div class="name">${t.name}</div>
                                <div class="sub">${t.desc}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    moduleScroll.innerHTML = html;
                } else if (sub === '叶色分类') {
                    moduleTitle.textContent = '叶色分类';
                    moduleSub.textContent = '7个色系';
                    moduleBreadcrumb.innerHTML = renderBreadcrumb();
                    let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">色彩科学</div>`;
                    html += `<div class="grid-cards color-grid">`;
                    COLOR_SERIES.forEach(c => {
                        html += `
                            <div class="grid-card" onclick="openColorDetail('${c.id}')">
                                <div class="name">${c.name}</div>
                                <div class="sub">${c.desc}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    moduleScroll.innerHTML = html;
                } else if (sub === '叶形分类') {
                    moduleTitle.textContent = '叶形分类';
                    moduleSub.textContent = '6种叶形';
                    moduleBreadcrumb.innerHTML = renderBreadcrumb();
                    let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">形态辨识</div>`;
                    html += `<div class="grid-cards leaf-grid">`;
                    LEAF_TYPES.forEach(l => {
                        html += `
                            <div class="grid-card" onclick="openLeafDetail('${l.id}')">
                                <div class="name">${l.name}</div>
                                <div class="sub">${l.desc}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    moduleScroll.innerHTML = html;
                } else {
                    path = [root];
                    renderPart2();
                }
            } else if (path.length === 3) {
                moduleTitle.textContent = path[2] || '详情';
                moduleSub.textContent = '';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                if (!document.querySelector('#moduleScroll .file-view')) {
                    goBackTo(path.length - 1);
                }
            }
            updateModuleHeaderVisibility();
        }

        function openPart2A() {
            if (path.length > 0) path = [path[0]];
            path.push('树形分类');
            renderPart2();
            pushHistoryState('树形分类');
        }
        function openPart2B() {
            if (path.length > 0) path = [path[0]];
            path.push('叶色分类');
            renderPart2();
            pushHistoryState('叶色分类');
        }
        function openPart2C() {
            if (path.length > 0) path = [path[0]];
            path.push('叶形分类');
            renderPart2();
            pushHistoryState('叶形分类');
        }

        function openTreeDetail(tid) {
            const tree = TREE_TYPES.find(t => t.id === tid);
            if (!tree || !tree.file) { alert('文件不存在'); return; }
            if (path.length < 2 || path[1] !== '树形分类') {
                if (path.length > 0) path = [path[0]];
                path.push('树形分类');
                renderPart2();
            }
            if (path.length === 2) path.push(tree.name);
            else path[2] = tree.name;
            openFileView(`${tree.num} ${tree.name}`, tree.file, tree.desc);
        }

        function openColorDetail(cid) {
            const color = COLOR_SERIES.find(c => c.id === cid);
            if (!color || !color.file) { alert('文件不存在'); return; }
            if (path.length < 2 || path[1] !== '叶色分类') {
                if (path.length > 0) path = [path[0]];
                path.push('叶色分类');
                renderPart2();
            }
            if (path.length === 2) path.push(color.name);
            else path[2] = color.name;
            openFileView(`${color.name}`, color.file, color.desc);
        }

        function openLeafDetail(lid) {
            const leaf = LEAF_TYPES.find(l => l.id === lid);
            if (!leaf || !leaf.file) { alert('文件不存在'); return; }
            if (path.length < 2 || path[1] !== '叶形分类') {
                if (path.length > 0) path = [path[0]];
                path.push('叶形分类');
                renderPart2();
            }
            if (path.length === 2) path.push(leaf.name);
            else path[2] = leaf.name;
            openFileView(`${leaf.name}`, leaf.file, leaf.desc);
        }

        // -------- Part3: 场景 --------
        function renderPart3() {
            moduleScroll.classList.remove('file-mode');
            if (path.length === 0) {
                path = ['场景节点速查手册'];
                moduleTitle.textContent = '场景节点速查手册';
                moduleSub.textContent = '八大场景';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                pushHistoryState('场景节点速查手册');
            }
            if (path.length === 1) {
                let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">79个节点</div>`;
                html += `<div class="grid-cards scene-grid">`;
                SCENES.forEach(s => {
                    html += `
                        <div class="grid-card" onclick="openScene('${s.id}')">
                            <span class="num" style="font-size:20px;font-weight:500;color:#3a7a78;">${s.nodes}</span>
                            <div class="name">${s.name}</div>
                            <div class="sub">${s.desc}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
            } else {
                moduleTitle.textContent = path[1] || '场景详情';
                moduleSub.textContent = '';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                if (!document.querySelector('#moduleScroll .file-view')) {
                    goBackTo(1);
                }
            }
            updateModuleHeaderVisibility();
        }

        function openScene(sid) {
            const scene = SCENES.find(s => s.id === sid);
            if (!scene || !scene.file) { alert('文件不存在'); return; }
            if (path.length === 0) path = ['场景节点速查手册'];
            if (path.length === 1) path.push(scene.name);
            else path[1] = scene.name;
            openFileView(scene.name, scene.file, `${scene.nodes} · ${scene.desc}`);
        }

        // -------- Part4: 话术 --------
        function renderPart4() {
            moduleScroll.classList.remove('file-mode');
            if (path.length === 0) {
                path = ['全体系话术手册'];
                moduleTitle.textContent = '全体系话术手册';
                moduleSub.textContent = '六大话术体系';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                pushHistoryState('全体系话术手册');
            }
            if (path.length === 1) {
                let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">顾问式沟通</div>`;
                html += `<div class="script-list">`;
                SCRIPT_TYPES.forEach(s => {
                    html += `
                        <div class="script-item" onclick="openScript('${s.id}')">
                            <div class="name">${s.name}</div>
                            <div class="desc">${s.desc}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
            } else {
                moduleTitle.textContent = path[1] || '话术详情';
                moduleSub.textContent = '';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                if (!document.querySelector('#moduleScroll .file-view')) {
                    goBackTo(1);
                }
            }
            updateModuleHeaderVisibility();
        }

        function openScript(sid) {
            const script = SCRIPT_TYPES.find(s => s.id === sid);
            if (!script || !script.file) { alert('文件不存在'); return; }
            if (path.length === 0) path = ['全体系话术手册'];
            if (path.length === 1) path.push(script.name);
            else path[1] = script.name;
            openFileView(script.name, script.file, script.desc);
        }

        // ================================================================
        //  ★★★ Part5: 品种速查（仅使用 click 事件，避免滑动误触）★★★
        // ================================================================
        function renderPart5() {
            moduleScroll.classList.remove('file-mode');
            if (path.length === 0) {
                path = ['主播品种速查手册'];
                moduleTitle.textContent = '主播品种速查手册';
                moduleSub.textContent = '52个品种 · 完整档案';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                pushHistoryState('主播品种速查手册');
            }

            if (path.length === 1) {
                let html = `<div style="margin-bottom:6px;font-size:14px;color:rgba(0,0,0,0.25);">共 ${VARIETIES.length} 个品种，点击进入详情</div>`;
                html += `<div class="variety-grid" id="varietyGrid">`;
                VARIETIES.forEach(v => {
                    html += `
                        <div class="variety-item" data-id="${v.id}" title="${v.name}">
                            <span class="name">${v.shortName}</span>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;

                const grid = document.getElementById('varietyGrid');
                if (grid) {
                    grid.addEventListener('click', function(e) {
                        let target = e.target.closest('.variety-item');
                        if (!target) return;
                        const id = target.dataset.id;
                        if (id) {
                            e.preventDefault();
                            openVariety(id);
                        }
                    });
                }

                updateModuleHeaderVisibility();
            } else if (path.length === 2) {
                const varietyName = path[1];
                const variety = VARIETIES.find(v => v.shortName === varietyName || v.name === varietyName);
                if (!variety) {
                    goBackTo(1);
                    return;
                }
                const displayName = variety.shortName;
                if (path[path.length - 1] !== displayName) {
                    path[path.length - 1] = displayName;
                }
                // 传入图片查看器注入
                openFileView(displayName, variety.file, '品种详情', false, injectImageViewer);
            }
        }

        function openVariety(vid) {
            const variety = VARIETIES.find(v => v.id === vid);
            if (!variety) { alert('品种不存在'); return; }
            if (path.length === 0) path = ['主播品种速查手册'];
            const displayName = variety.shortName;
            if (path.length === 1) {
                path.push(displayName);
            } else {
                path[1] = displayName;
            }
            renderPart5();
        }

        // -------- Part6: 物流及赠品 --------
        function renderPart6() {
            moduleScroll.classList.remove('file-mode');
            if (path.length === 0) {
                path = ['物流及赠品'];
                moduleTitle.textContent = '物流及赠品';
                moduleSub.textContent = '3 项内容';
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                pushHistoryState('物流及赠品');
            }

            if (path.length === 1) {
                let html = `<div style="margin-bottom:10px;font-size:16px;color:rgba(0,0,0,0.25);">选择查看内容</div>`;
                html += `<div class="list-view">`;
                PART6_ITEMS.forEach(item => {
                    html += `
                        <div class="list-item" onclick="openPart6Item('${item.id}')">
                            <div class="left"><div class="title">${item.name}</div></div>
                            <span class="arrow">›</span>
                        </div>
                    `;
                });
                html += `</div>`;
                moduleScroll.innerHTML = html;
                updateModuleHeaderVisibility();
            } else if (path.length === 2) {
                const itemName = path[1];
                const item = PART6_ITEMS.find(i => i.name === itemName);
                if (!item) {
                    goBackTo(1);
                    return;
                }
                let extra = null;
                if (item.id === 'p6_3') {
                    extra = fixFertilizerLayout;
                }
                openFileView(item.name, item.file, '', false, extra);
                updateModuleHeaderVisibility();
            }
        }

        function openPart6Item(id) {
            const item = PART6_ITEMS.find(i => i.id === id);
            if (!item) { alert('内容不存在'); return; }
            if (path.length === 0) path = ['物流及赠品'];
            if (path.length === 1) {
                path.push(item.name);
            } else {
                path[1] = item.name;
            }
            renderPart6();
        }
        window.openPart6Item = openPart6Item;

        // ================================================================
        //  监听来自 iframe 的 postMessage
        // ================================================================
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data && data.type === 'navigate' && Array.isArray(data.path) && data.path.length > 0) {
                const root = data.path[0];
                const rest = data.path.slice(1);
                if (currentModule === 'part5') {
                    const newPath = [root, ...rest];
                    if (JSON.stringify(newPath) !== JSON.stringify(path)) {
                        path = newPath;
                        renderPart5();
                        moduleBreadcrumb.innerHTML = renderBreadcrumb();
                        const last = path[path.length - 1];
                        pushHistoryState(last);
                        updateModuleHeaderVisibility();
                    }
                }
            }
            if (data && data.type === 'backRequest') {
                if (currentModule && path.length > 1) {
                    history.back();
                } else {
                    hideModule();
                }
            }
        });

        // ================================================================
        //  浏览器后退 / 手机物理返回键
        // ================================================================
        window.addEventListener('popstate', function(event) {
            const state = event.state;
            if (state && state.module && state.path) {
                currentModule = state.module;
                path = state.path;
                showModule();
                renderCurrentModule();
                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                updateHeaderFromPath();
                updateModuleHeaderVisibility();
            } else {
                if (moduleView.classList.contains('active')) {
                    if (currentModule === 'part5' && path.length === 2) {
                        if (historyStack.length > 1) {
                            const prev = historyStack[historyStack.length - 2];
                            if (prev && prev.module === 'part5' && prev.path.length === 1) {
                                currentModule = prev.module;
                                path = prev.path;
                                showModule();
                                renderCurrentModule();
                                moduleBreadcrumb.innerHTML = renderBreadcrumb();
                                updateHeaderFromPath();
                                updateModuleHeaderVisibility();
                                pushHistoryState(path[path.length-1]);
                                return;
                            }
                        }
                        if (path.length > 1) {
                            path = path.slice(0, 1);
                            renderCurrentModule();
                            moduleBreadcrumb.innerHTML = renderBreadcrumb();
                            updateHeaderFromPath();
                            updateModuleHeaderVisibility();
                            pushHistoryState(path[0]);
                            return;
                        }
                    }
                    if (path.length > 1) {
                        history.back();
                    } else {
                        hideModule();
                    }
                }
            }
        });

        // ================================================================
        //  事件绑定
        // ================================================================
        document.querySelectorAll('.card-item').forEach(card => {
            card.addEventListener('click', () => {
                const module = card.dataset.module;
                if (!module) return;
                currentModule = module;
                path = [];
                showModule();
                renderCurrentModule();
                if (path.length > 0) {
                    pushHistoryState(path[0]);
                }
                updateModuleHeaderVisibility();
            });
        });

        moduleBack.addEventListener('click', function(e) {
            e.preventDefault();
            navigateBack();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && moduleView.classList.contains('active')) {
                navigateBack();
            }
        });

        // 暴露函数到全局
        window.openCourse = openCourse;
        window.openTreeDetail = openTreeDetail;
        window.openColorDetail = openColorDetail;
        window.openLeafDetail = openLeafDetail;
        window.openScene = openScene;
        window.openScript = openScript;
        window.openPart2A = openPart2A;
        window.openPart2B = openPart2B;
        window.openPart2C = openPart2C;
        window.openVariety = openVariety;
        window.goBackTo = goBackTo;
        window.navigateBack = navigateBack;

        console.log('🌳 山秋枫树园 · 庭院美学顾问赋能平台 (全屏图片查看器-重试版)');
        console.log('📸 点击品种详情中的任意图片即可全屏缩放查看');
    </script>

</body>
